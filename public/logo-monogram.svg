<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Tushar Lab — TL Interlocked Monogram
    Navy Blue monogram on white background
  -->

  <!-- White background -->
  <rect width="100" height="100" fill="#FFFFFF"/>

  <!-- TL monogram in Navy Blue -->
  <!-- T crossbar (full width at top) -->
  <rect x="5" y="5" width="60" height="15" fill="#0C234B"/>

  <!-- T stem (left side, going down) -->
  <rect x="5" y="5" width="18" height="90" fill="#0C234B"/>

  <!-- L stem (right of T stem, starts below T crossbar) -->
  <rect x="35" y="20" width="18" height="75" fill="#0C234B"/>

  <!-- L base (extends right at bottom) -->
  <rect x="35" y="78" width="55" height="17" fill="#0C234B"/>
</svg>
