<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Tushar Lab — TL Interlocked Monogram
    White background, UofA Cardinal Red #AB0520 bars
  -->

  <!-- White background -->
  <rect width="100" height="100" fill="#FFFFFF"/>

  <!-- T — drawn as a single path -->
  <path d="M5,5 H55 V20 H37 V90 H23 V20 H5 Z" fill="#AB0520"/>

  <!-- L — drawn as a single path -->
  <path d="M45,15 H59 V80 H95 V95 H45 Z" fill="#AB0520"/>

  <!-- Interlock: T stem passes OVER L's vertical in upper zone -->
  <rect x="23" y="15" width="14" height="35" fill="#AB0520"/>

  <!-- Interlock: L stem passes OVER T's stem in lower zone -->
  <rect x="45" y="50" width="14" height="40" fill="#AB0520"/>
</svg>
