<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Tushar Lab TL Monogram — Favicon (simplified for small size) -->
  <rect width="32" height="32" rx="4" fill="#0C234B"/>
  <!-- T (Cardinal Red) -->
  <rect x="3" y="4" width="18" height="4.5" rx="1" fill="#AB0520"/>
  <rect x="3" y="4" width="4.5" height="7" rx="1" fill="#AB0520"/>
  <rect x="16.5" y="4" width="4.5" height="7" rx="1" fill="#AB0520"/>
  <rect x="9" y="4" width="5" height="24" rx="1" fill="#AB0520"/>
  <rect x="6" y="23.5" width="11" height="4.5" rx="1" fill="#AB0520"/>
  <!-- L (White on dark bg) -->
  <rect x="14.5" y="7.5" width="5" height="21" rx="1" fill="#FFFFFF"/>
  <rect x="14.5" y="7.5" width="10" height="4.5" rx="1" fill="#FFFFFF"/>
  <rect x="14.5" y="23.5" width="14.5" height="4.5" rx="1" fill="#FFFFFF"/>
  <!-- Interlock: T over L upper -->
  <rect x="9" y="7.5" width="5" height="8" fill="#AB0520"/>
  <!-- Interlock: L over T lower -->
  <rect x="14.5" y="15.5" width="5" height="8" fill="#FFFFFF"/>
</svg>
